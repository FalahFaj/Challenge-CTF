<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <title>Send a Quote</title>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: url('https://unej.ac.id/wp-content/uploads/2024/09/bgheaderunej2024.webp') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }
    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .animated-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.4) 0%, rgba(0,0,0,0) 70%);
      top: -100px;
      left: -100px;
      border-radius: 50%;
      z-index: -1;
      animation: float 6s ease-in-out infinite;
    }
    .animated-bg-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(236,72,153,0.3) 0%, rgba(0,0,0,0) 70%);
      bottom: -50px;
      right: -50px;
      border-radius: 50%;
      z-index: -1;
      animation: float 8s ease-in-out infinite reverse;
    }
    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(20px) scale(1.05); }
      100% { transform: translateY(0px) scale(1); }
    }
    input:focus {
      outline: none;
      box-shadow: 0 0 0 2px #8b5cf6;
      border-color: transparent;
    }
    .btn-hover {
      transition: all 0.3s ease;
    }
    .btn-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
    }
    .loading-spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top: 3px solid #fff;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="flex items-center justify-center h-screen w-full relative overflow-hidden">
  <div class="animated-bg"></div>
  <div class="animated-bg-2"></div>

  <main class="w-full max-w-lg px-6 relative z-10">
    <div class="glass rounded-3xl p-8 sm:p-12 flex flex-col items-center text-center">
      <div class="mb-8">
        <div class="w-16 h-16 bg-gradient-to-tr from-violet-600 to-fuchsia-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg rotate-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold tracking-tight mb-2">Quote Sender</h1>
        <p class="text-gray-400 text-sm">Kirim quote untuk rektor, quotes kamu akan di baca satu-satu nantinya</p>
      </div>

      <form id="quoteForm" method="post" action="/" class="w-full flex flex-col gap-5">
        <div class="flex flex-col items-start w-full">
          <label for="url" class="text-sm font-semibold text-gray-300 mb-2 ml-1">Your Quote</label>
          <input type="text" id="url" name="url" placeholder="e.g. 'Kami akan belajar lebih giat...tapi nanti'" required
            class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 transition-all duration-300 focus:bg-white/10">
        </div>
        <button type="submit" id="submitBtn" class="btn-hover mt-2 w-full py-3 bg-gradient-to-r from-violet-600 to-fuchsia-600 rounded-xl font-bold text-white shadow-lg flex justify-center items-center gap-2">
          <span>Kirim Quote</span>
          <div class="loading-spinner" id="spinner"></div>
        </button>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('quoteForm').addEventListener('submit', function() {
      const btn = document.getElementById('submitBtn');
      const spinner = document.getElementById('spinner');
      btn.querySelector('span').textContent = 'Sending...';
      btn.classList.add('opacity-80', 'cursor-not-allowed');
      spinner.style.display = 'block';
    });
  </script>
</body>
</html>
