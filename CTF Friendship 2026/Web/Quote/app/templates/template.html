<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <title>Result - Quote Sender</title>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      {% if status >= 400 %}
      background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT-uIF3e6_jSmh2pNl7_q4T5jI6_pR7k-5ECg&s') no-repeat center center fixed;
      {% else %}
      background: url('https://unej.ac.id/wp-content/uploads/2024/09/bgheaderunej2024.webp') no-repeat center center fixed;
      {% endif %}
      background-size: cover;
      color: white;
    }
    .glass {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .animated-bg {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124,58,237,0.4) 0%, rgba(0,0,0,0) 70%);
      top: -100px;
      left: -100px;
      border-radius: 50%;
      z-index: -1;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(20px) scale(1.05); }
      100% { transform: translateY(0px) scale(1); }
    }
    .btn-hover {
      transition: all 0.3s ease;
    }
    .btn-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
    }
  </style>
</head>
<body class="flex items-center justify-center h-screen w-full relative overflow-hidden">
  <div class="animated-bg"></div>

  <main class="w-full max-w-lg px-6 relative z-10 text-center">
    <div class="glass rounded-3xl p-8 sm:p-12 flex flex-col items-center">
      {% if status >= 400 %}
      <div class="w-16 h-16 bg-red-500/20 border border-red-500/50 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-red-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      {% else %}
      <div class="w-16 h-16 bg-emerald-500/20 border border-emerald-500/50 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-emerald-500/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      {% endif %}

      <h1 class="text-4xl font-bold tracking-tight mb-2 {{ 'text-red-300' if status >= 400 else 'text-emerald-300' }}">
        HTTP {{status}}
      </h1>
      <p class="text-xl text-gray-200 font-medium mb-8">{{message}}</p>
      
      <a href="/" class="btn-hover px-8 py-3 bg-white/10 hover:bg-white/20 border border-white/10 rounded-xl font-semibold text-white transition-colors">
        Go Back
      </a>
    </div>
  </main>
</body>
</html>
