{% extends "base.html" %}
{% block title %}Portal Verifikasi{% endblock %}
{% block content %}
<style>
    body {
        background-color: transparent !important;
        background: black;
    }
    .video-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
    }
    .video-background iframe {
        width: 100vw;
        height: 56.25vw;
        min-height: 100vh;
        min-width: 177.77vh;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
    .verification-container {
        background: rgba(244, 241, 222, 0.9);
        padding: 30px;
        border-radius: 10px;
        display: inline-block;
        margin-top: 20px;
        border: 2px solid #5C4033;
    }
</style>

<div class="video-background">
  <iframe src="https://www.youtube.com/embed/CID-sYQNCew?autoplay=1&mute=0&controls=0&showinfo=0&autohide=1&loop=1&playlist=CID-sYQNCew" frameborder="0" allowfullscreen allow="autoplay"></iframe>
</div>

<div class="verification-container">
    <h1>Halaman Verifikasi</h1>
    <h3 align="center">Kirimkan foto lencana Pasukan Pengintai Anda</h3>
    <br>
    <form method="POST" enctype=multipart/form-data>
        <label for="file">Lampiran:</label>
        <input class="file-input" type="file" name="file">
        <div class="verification-send-btn" align="center">
            <button type="submit" class="btn btn-dark">Kirim</button>
        </div>
    </form>
</div>
{% endblock %}
